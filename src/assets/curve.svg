  <circle fill="url(#navyFade)" mask="url(#m2)" opacity="50%" cx="800" cy="-1340" r="1450" filter="url(#f1)" />
  <circle fill="url(#g1)" mask="url(#m1)" cx="800" cy="5200" r="5200" />
