<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="100" preserveAspectRatio="none">
  <defs>
    <filter id="f1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
    </filter>
    
    <linearGradient id="g1">
      <stop offset="44%" stop-color="purple" />
      <stop offset="50%" stop-color="#e50914" />
      <stop offset="56%" stop-color="purple" />
    </linearGradient>

    <linearGradient id="navyFade" x1="" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
